apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-engine
  labels:
    app: python-engine
    version: v3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-engine
  template:
    metadata:
      labels:
        app: python-engine
        version: v3
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: engine
          image: minicc/python-engine:3.0.0
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # LLM Provider Keys（从 Secret 注入）
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: anthropic
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: openai
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-keys
                  key: deepseek
                  optional: true
            # 基础设施
            - name: REDIS_URL
              value: "redis://redis-cluster:6379"
            - name: MILVUS_ADDRESS
              value: "milvus:19530"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            # 可观测性
            - name: OTEL_ENDPOINT
              value: "http://otel-collector:4317"
            - name: LOG_LEVEL
              value: "INFO"
            # 限流
            - name: RATE_LIMIT_RPM
              value: "120"
            - name: RATE_LIMIT_RPS
              value: "20"
            # 队列
            - name: QUEUE_WORKER_CONCURRENCY
              value: "10"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
