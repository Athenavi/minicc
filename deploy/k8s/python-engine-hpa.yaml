apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: python-engine
  labels:
    app: python-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: python-engine
  minReplicas: 2
  maxReplicas: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
  metrics:
    # CPU 利用率
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # 内存利用率
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # 自定义指标：活跃请求数（需 Prometheus Adapter）
    # - type: Pods
    #   pods:
    #     metric:
    #       name: instance_active_requests
    #     target:
    #       type: AverageValue
    #       averageValue: "80"
