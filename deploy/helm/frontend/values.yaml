# MiniCC Frontend Helm Values

replicaCount: 2

image:
  repository: minicc/frontend
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

# 环境变量
env:
  VITE_API_URL: ""
  VITE_WS_URL: ""

# 端口
service:
  type: ClusterIP
  port: 80

# 资源限制
resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# 健康检查
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: minicc.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
