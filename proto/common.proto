syntax = "proto3";
package minicc;
option go_package = "github.com/athenavi/minicc/proto";

// 共享消息类型

message Message {
  string role = 1;          // "user" | "assistant" | "system" | "tool"
  string content = 2;
  string tool_call_id = 3;  // tool 角色时使用
  repeated ToolCall tool_calls = 4;  // assistant 角色时的工具调用请求
}

message ToolDef {
  string name = 1;
  string description = 2;
  string parameters_json = 3;  // JSON Schema 格式的参数定义
}

message ToolCall {
  string id = 1;        // 工具调用 ID
  string name = 2;      // 工具名称
  string arguments = 3; // JSON 格式的参数
}

message Usage {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 total_tokens = 3;
}

message LLMConfig {
  string model = 1;         // 模型名称，如 "claude-sonnet-4-20250514"
  int32 max_tokens = 2;     // 最大输出 Token 数
  float temperature = 3;    // 温度参数
  string provider = 4;      // 可选：指定 Provider
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;   // "ok" | "degraded" | "down"
  string version = 2;
  string uptime = 3;
}
